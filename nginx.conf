server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|jpg|jpeg|png|webp|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
